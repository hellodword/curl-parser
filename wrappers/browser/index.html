<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>curl-parser wasm demo</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4efe6;
        --ink: #1f2520;
        --muted: #657064;
        --panel: #fffaf0;
        --line: #d7c8af;
        --accent: #c94b2f;
        --accent-ink: #fff8ed;
        --code: #18211c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background:
          radial-gradient(circle at 20% 15%, #ffd39c 0, transparent 26rem),
          radial-gradient(circle at 80% 0%, #b7d7b3 0, transparent 24rem),
          linear-gradient(135deg, #f8f1e5, var(--bg));
        font-family: ui-serif, Georgia, "Times New Roman", serif;
      }

      main {
        width: min(1100px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 48px 0;
      }

      h1 {
        margin: 0;
        max-width: 820px;
        font-size: clamp(2rem, 7vw, 5rem);
        line-height: 0.92;
        letter-spacing: -0.06em;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 1.05rem;
      }

      .stack {
        display: flex;
        flex-direction: column;
        gap: 18px;
        margin-top: 34px;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 22px;
        background: color-mix(in srgb, var(--panel) 92%, white);
        box-shadow: 0 24px 70px rgb(57 42 20 / 14%);
        overflow: hidden;
      }

      .card header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 16px 18px;
        border-bottom: 1px solid var(--line);
      }

      .card h2 {
        margin: 0;
        font-size: 0.95rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      textarea {
        width: 100%;
        height: 123px;
        min-height: 123px;
        margin: 0;
        padding: 18px;
        border: 0;
        outline: 0;
        resize: vertical;
        color: var(--code);
        background: transparent;
        font: 14px/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        tab-size: 2;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      pre {
        width: 100%;
        min-height: 560px;
        margin: 0;
        padding: 18px;
        border: 0;
        outline: 0;
        resize: vertical;
        color: var(--code);
        background: transparent;
        font: 14px/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        tab-size: 2;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      .visual-body {
        display: grid;
        gap: 12px;
        padding: 18px;
      }

      .visual-empty {
        color: var(--muted);
        font: 0.95rem/1.5 ui-sans-serif, system-ui, sans-serif;
      }

      .visual-row {
        display: grid;
        grid-template-columns: minmax(0, 0.85fr) 42px minmax(0, 1.5fr);
        gap: 12px;
        align-items: stretch;
      }

      .arg-token,
      .meaning {
        border: 1px solid color-mix(in srgb, var(--line) 80%, white);
        border-radius: 16px;
        background: #fff6e6;
      }

      .arg-token {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 14px;
        color: var(--code);
        font: 700 0.92rem/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas,
          monospace;
        overflow-wrap: anywhere;
      }

      .arg-index {
        flex: 0 0 auto;
        color: var(--muted);
        font: 700 0.72rem/1 ui-sans-serif, system-ui, sans-serif;
      }

      .arrow {
        display: grid;
        place-items: center;
        color: var(--accent);
        font: 900 1.35rem/1 ui-sans-serif, system-ui, sans-serif;
      }

      .meaning {
        padding: 12px 14px;
        font: 0.95rem/1.45 ui-sans-serif, system-ui, sans-serif;
      }

      .meaning-title {
        display: block;
        margin-bottom: 5px;
        color: var(--ink);
        font-weight: 800;
      }

      .meaning-detail {
        color: var(--muted);
      }

      .meaning-list {
        display: grid;
        gap: 8px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 24px;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 11px 18px;
        color: var(--accent-ink);
        background: var(--accent);
        font: 700 0.95rem/1 ui-sans-serif, system-ui, sans-serif;
        cursor: pointer;
      }

      button.secondary {
        color: var(--ink);
        background: #e4d5bd;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.65;
      }

      .status {
        margin-left: auto;
        align-self: center;
        color: var(--muted);
        font: 0.9rem/1.3 ui-sans-serif, system-ui, sans-serif;
      }

      code {
        padding: 2px 6px;
        border-radius: 7px;
        background: #e9dcc5;
      }

      @media (max-width: 800px) {
        main {
          padding: 28px 0;
        }

        pre {
          min-height: 440px;
        }

        .visual-row {
          grid-template-columns: 1fr;
          gap: 8px;
        }

        .arrow {
          justify-content: start;
          padding-left: 14px;
          transform: rotate(90deg);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>curl parser wasm demo</h1>

      <div class="actions">
        <button id="parse">Parse command</button>
        <button id="sample" class="secondary">Reset sample</button>
        <span id="status" class="status">Loading wasm...</span>
      </div>

      <section class="stack">
        <article class="card">
          <header>
            <h2>Input command</h2>
          </header>
          <textarea id="command" spellcheck="false"></textarea>
        </article>

        <article class="card">
          <header>
            <h2>Argument map</h2>
          </header>
          <div id="visualization" class="visual-body" aria-live="polite">
            <div class="visual-empty">Waiting for input...</div>
          </div>
        </article>

        <article class="card">
          <header>
            <h2>Raw parse result</h2>
          </header>
          <pre id="output">Waiting for wasm...</pre>
        </article>
      </section>
    </main>

    <script type="module">
      const sampleCommand =
        "curl -vfLvsSviG4#01 google.com https://github.com";
      const wasmUrls = [
        new URL("../../dist/curl_parser.wasm", import.meta.url),
        new URL("./dist/curl_parser.wasm", import.meta.url),
      ];
      const encoder = new TextEncoder();
      const decoder = new TextDecoder();

      const commandEl = document.querySelector("#command");
      const outputEl = document.querySelector("#output");
      const visualizationEl = document.querySelector("#visualization");
      const statusEl = document.querySelector("#status");
      const parseButton = document.querySelector("#parse");
      const sampleButton = document.querySelector("#sample");

      let parser = null;

      commandEl.value = sampleCommand;
      parseButton.disabled = true;

      function splitCommand(command) {
        const argv = [];
        let token = "";
        let quote = null;
        let tokenStarted = false;

        for (let i = 0; i < command.length; i += 1) {
          const ch = command[i];

          if (quote) {
            if (ch === quote) {
              quote = null;
              tokenStarted = true;
              continue;
            }
            if (quote === '"' && ch === "\\") {
              i += 1;
              if (i >= command.length) {
                throw new Error("Trailing backslash in double-quoted string");
              }
              token += command[i];
              tokenStarted = true;
              continue;
            }
            token += ch;
            tokenStarted = true;
            continue;
          }

          if (ch === "'" || ch === '"') {
            quote = ch;
            tokenStarted = true;
            continue;
          }

          if (/\s/.test(ch)) {
            if (tokenStarted) {
              argv.push(token);
              token = "";
              tokenStarted = false;
            }
            continue;
          }

          if (ch === "\\") {
            i += 1;
            if (i >= command.length) {
              throw new Error("Trailing backslash");
            }
            token += command[i];
            tokenStarted = true;
            continue;
          }

          token += ch;
          tokenStarted = true;
        }

        if (quote) {
          throw new Error(`Unclosed ${quote} quote`);
        }
        if (tokenStarted) {
          argv.push(token);
        }
        if (!argv.length) {
          throw new Error("Command is empty");
        }
        if (argv[0] !== "curl") {
          argv.unshift("curl");
        }
        return argv;
      }

      function memoryBytes(instance) {
        return new Uint8Array(instance.exports.memory.buffer);
      }

      function readU32(instance, ptr) {
        return new DataView(instance.exports.memory.buffer).getUint32(ptr, true);
      }

      function writeJson(instance, value) {
        const bytes = encoder.encode(JSON.stringify(value));
        const ptr = instance.exports.curlparse_alloc(bytes.length + 1);
        if (!ptr) {
          throw new Error("curlparse_alloc failed for input buffer");
        }
        memoryBytes(instance).set(bytes, ptr);
        memoryBytes(instance)[ptr + bytes.length] = 0;
        return [ptr, bytes.length];
      }

      function makeWasiImports(getInstance) {
        const ERRNO_SUCCESS = 0;
        const ERRNO_BADF = 8;
        const ERRNO_NOSYS = 52;

        function view() {
          return new DataView(getInstance().exports.memory.buffer);
        }

        function bytes() {
          return new Uint8Array(getInstance().exports.memory.buffer);
        }

        function writeU32(ptr, value) {
          view().setUint32(ptr, value, true);
        }

        function writeU64(ptr, value) {
          view().setBigUint64(ptr, BigInt(value), true);
        }

        return {
          environ_sizes_get(countPtr, bufferSizePtr) {
            writeU32(countPtr, 0);
            writeU32(bufferSizePtr, 0);
            return ERRNO_SUCCESS;
          },
          environ_get() {
            return ERRNO_SUCCESS;
          },
          fd_close() {
            return ERRNO_SUCCESS;
          },
          fd_fdstat_get(fd, statPtr) {
            if (fd > 2) {
              return ERRNO_BADF;
            }
            bytes().fill(0, statPtr, statPtr + 24);
            bytes()[statPtr] = 2;
            writeU64(statPtr + 8, 0);
            writeU64(statPtr + 16, 0);
            return ERRNO_SUCCESS;
          },
          fd_fdstat_set_flags(fd) {
            return fd <= 2 ? ERRNO_SUCCESS : ERRNO_BADF;
          },
          fd_filestat_get(fd, statPtr) {
            if (fd > 2) {
              return ERRNO_BADF;
            }
            bytes().fill(0, statPtr, statPtr + 64);
            return ERRNO_SUCCESS;
          },
          fd_prestat_get() {
            return ERRNO_BADF;
          },
          fd_prestat_dir_name() {
            return ERRNO_BADF;
          },
          fd_read() {
            return ERRNO_BADF;
          },
          fd_seek(_fd, _offsetLow, _offsetHigh, _whence, newOffsetPtr) {
            writeU64(newOffsetPtr, 0);
            return ERRNO_BADF;
          },
          fd_write(fd, iovsPtr, iovsLen, writtenPtr) {
            if (fd !== 1 && fd !== 2) {
              return ERRNO_BADF;
            }
            let written = 0;
            let text = "";
            const data = bytes();
            const dataView = view();
            for (let i = 0; i < iovsLen; i += 1) {
              const ptr = dataView.getUint32(iovsPtr + i * 8, true);
              const len = dataView.getUint32(iovsPtr + i * 8 + 4, true);
              text += decoder.decode(data.subarray(ptr, ptr + len));
              written += len;
            }
            if (text) {
              (fd === 2 ? console.warn : console.log)(text);
            }
            writeU32(writtenPtr, written);
            return ERRNO_SUCCESS;
          },
          path_filestat_get() {
            return ERRNO_BADF;
          },
          path_open() {
            return ERRNO_BADF;
          },
          proc_exit(code) {
            throw new Error(`WASI proc_exit(${code})`);
          },
        };
      }

      async function createParser() {
        let instance = null;
        const imports = {
          wasi_snapshot_preview1: makeWasiImports(() => instance),
        };
        let wasmBytes = null;
        let lastError = null;

        for (const wasmUrl of wasmUrls) {
          try {
            const response = await fetch(wasmUrl);
            if (!response.ok) {
              throw new Error(`Failed to load ${wasmUrl.pathname}: ${response.status}`);
            }
            wasmBytes = await response.arrayBuffer();
            break;
          } catch (error) {
            lastError = error;
          }
        }

        if (!wasmBytes) {
          throw lastError || new Error("Failed to load wasm");
        }

        const instantiated = await WebAssembly.instantiate(wasmBytes, imports);
        instance = instantiated.instance;
        instance.exports._initialize?.();

        return {
          parse(input) {
            const [inputPtr, inputLen] = writeJson(instance, input);
            const pairPtr = instance.exports.curlparse_alloc(8);

            if (!pairPtr) {
              instance.exports.curlparse_free(inputPtr, inputLen);
              throw new Error("curlparse_alloc failed for output pair");
            }

            const rc = instance.exports.curlparse_parse(
              inputPtr,
              inputLen,
              pairPtr,
            );

            instance.exports.curlparse_free(inputPtr, inputLen);

            if (rc !== 0) {
              instance.exports.curlparse_free(pairPtr, 8);
              throw new Error(`curlparse_parse ABI error: ${rc}`);
            }

            const outPtr = readU32(instance, pairPtr);
            const outLen = readU32(instance, pairPtr + 4);
            const outBytes = new Uint8Array(
              instance.exports.memory.buffer,
              outPtr,
              outLen,
            );
            const outText = decoder.decode(outBytes);

            instance.exports.curlparse_free(outPtr, outLen);
            instance.exports.curlparse_free(pairPtr, 8);

            return JSON.parse(outText);
          },
        };
      }

      function render(value) {
        outputEl.textContent = JSON.stringify(value, null, 2);
      }

      const optionMeanings = new Map([
        ["header", "Request header"],
        ["json", "JSON request body"],
        ["data", "Request body data"],
        ["data-raw", "Raw request body"],
        ["fail", "Fail on HTTP error status"],
        ["url", "Request URL"],
        ["user-agent", "User-Agent header"],
        ["user", "Auth credentials"],
        ["proxy", "Proxy server"],
        ["request", "HTTP method"],
        ["connect-timeout", "Connection timeout"],
        ["max-time", "Total timeout"],
        ["retry", "Retry count"],
        ["http2", "Force HTTP/2"],
        ["http3", "Force HTTP/3"],
        ["location", "Follow redirects"],
        ["verbose", "Verbose diagnostics"],
        ["silent", "Silent mode"],
        ["show-error", "Show errors in silent mode"],
        ["show-headers", "Include response headers"],
        ["get", "Move data into query string"],
        ["ipv4", "Use IPv4"],
        ["ipv6", "Use IPv6"],
        ["remote-name", "Save with remote filename"],
        ["remote-header-name", "Use response filename"],
        ["output", "Output file"],
        ["upload-file", "Upload file"],
        ["config", "Read config file"],
        ["progress-meter", "Progress meter"],
        ["progress-bar", "Progress bar"],
        ["http1.0", "Use HTTP/1.0"],
        ["tlsv1", "Use TLS v1 or later"],
      ]);

      function appendText(parent, className, text) {
        const node = document.createElement("span");
        node.className = className;
        node.textContent = text;
        parent.append(node);
        return node;
      }

      function looksLikeUrl(value) {
        return /^[a-z][a-z0-9+.-]*:\/\//i.test(value) || /\.[a-z0-9-]+/i.test(value);
      }

      function optionLabel(event) {
        if (event.isNext) {
          return "Start next transfer";
        }
        if (event.isPositional) {
          return looksLikeUrl(event.value || event.rawFlag)
            ? "Request target"
            : "Positional argument";
        }
        const label =
          optionMeanings.get(event.canonical) || `curl option: ${event.canonical}`;
        return event.negated ? `Disable ${label}` : label;
      }

      function describeEvent(event) {
        if (event.isNext) {
          return "Splits following arguments into another curl operation.";
        }
        if (event.isPositional) {
          return looksLikeUrl(event.value || event.rawFlag)
            ? "Parsed as URL instead of an option."
            : "Passed through as a non-option argument.";
        }
        if (event.value !== null && event.value !== undefined) {
          if (event.usedNextArg) {
            return `Consumes argv[${event.valueArgvIndex}] as value: ${event.value}`;
          }
          if (event.rawFlag.includes("=")) {
            return `Reads value after "=": ${event.value}`;
          }
          return `Reads inline value: ${event.value}`;
        }
        return event.negated ? "Boolean switch set to false." : "Boolean switch set to true.";
      }

      function addMeaning(row, title, detail) {
        const existing = row.meanings.find(
          (item) => item.title === title && item.detail === detail,
        );
        if (existing) {
          existing.count += 1;
          return;
        }
        row.meanings.push({ title, detail, count: 1 });
      }

      function buildArgumentMap(argv, result) {
        const rows = argv.map((token, index) => ({
          index,
          token,
          meanings: [],
        }));

        if (rows[0]) {
          addMeaning(
            rows[0],
            "curl executable",
            "Command entry point; later arguments are parsed by curl.",
          );
        }

        for (const event of result.events || []) {
          const row = rows[event.argvIndex];
          if (!row) {
            continue;
          }

          addMeaning(row, optionLabel(event), describeEvent(event));

          if (
            event.usedNextArg &&
            event.valueArgvIndex !== null &&
            event.valueArgvIndex !== event.argvIndex &&
            rows[event.valueArgvIndex]
          ) {
            addMeaning(
              rows[event.valueArgvIndex],
              `${event.rawFlag} value`,
              `Consumed by argv[${event.argvIndex}], so it is not treated as a URL.`,
            );
          }
        }

        for (const row of rows) {
          if (!row.meanings.length) {
            addMeaning(
              row,
              "Unclassified argument",
              "Parser kept this argv item, but no event mapped to it.",
            );
          }
        }

        return rows;
      }

      function renderVisualization(argv, result) {
        visualizationEl.replaceChildren();

        if (!argv.length || !result) {
          const empty = document.createElement("div");
          empty.className = "visual-empty";
          empty.textContent = "Waiting for a parsed command...";
          visualizationEl.append(empty);
          return;
        }

        for (const row of buildArgumentMap(argv, result)) {
          const line = document.createElement("div");
          line.className = "visual-row";

          const token = document.createElement("div");
          token.className = "arg-token";
          appendText(token, "arg-index", `argv[${row.index}]`);
          appendText(token, "arg-text", row.token);

          const arrow = document.createElement("div");
          arrow.className = "arrow";
          arrow.textContent = "->";

          const meaning = document.createElement("div");
          meaning.className = "meaning";
          const list = document.createElement("div");
          list.className = "meaning-list";
          for (const item of row.meanings) {
            const itemEl = document.createElement("div");
            appendText(
              itemEl,
              "meaning-title",
              item.count > 1 ? `${item.title} x${item.count}` : item.title,
            );
            appendText(itemEl, "meaning-detail", item.detail);
            list.append(itemEl);
          }
          meaning.append(list);

          line.append(token, arrow, meaning);
          visualizationEl.append(line);
        }
      }

      async function parseCurrentCommand() {
        try {
          const argv = splitCommand(commandEl.value);
          const result = parser.parse({
            inputMode: "argv",
            argv,
          });
          render(result);
          renderVisualization(argv, result);
          statusEl.textContent = result.ok ? "Parsed OK" : "Parsed with errors";
        } catch (error) {
          renderVisualization([], null);
          outputEl.textContent = String(error.stack || error);
          statusEl.textContent = "Parse failed";
        }
      }

      parseButton.addEventListener("click", parseCurrentCommand);
      sampleButton.addEventListener("click", () => {
        commandEl.value = sampleCommand;
        parseCurrentCommand();
      });

      try {
        parser = await createParser();
        statusEl.textContent = "Wasm ready";
        parseButton.disabled = false;
        parseCurrentCommand();
      } catch (error) {
        statusEl.textContent = "Wasm load failed";
        outputEl.textContent = `${String(error.stack || error)}

Tip: run this from the repository root:

  python -m http.server 8000

Then open:

  http://localhost:8000/wrappers/browser/`;
      }
    </script>
  </body>
</html>
