name: Publish Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          ref: "master"
          fetch-depth: 0

      - name: Install Nix with official installer
        shell: bash
        run: |
          set -euxo pipefail

          sudo apt-get update
          sudo apt-get install -y xz-utils

          curl -L https://nixos.org/nix/install | sh -s -- --daemon

          echo "/nix/var/nix/profiles/default/bin" >> "$GITHUB_PATH"
          echo "NIX_REMOTE=daemon" >> "$GITHUB_ENV"

          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh

          nix --version

      - name: Configure Nix
        shell: bash
        env:
          GITHUB_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail

          sudo sed -i \
            -e '/^experimental-features[[:space:]]*=/d' \
            -e '/^max-jobs[[:space:]]*=/d' \
            -e '/^trusted-users[[:space:]]*=/d' \
            -e '/^access-tokens[[:space:]]*=/d' \
            /etc/nix/nix.conf

          printf '%s\n' \
            "experimental-features = nix-command flakes" \
            "max-jobs = auto" \
            "trusted-users = root ${USER}" \
            "access-tokens = github.com=$GITHUB_ACCESS_TOKEN" \
            | sudo tee -a /etc/nix/nix.conf

          sudo systemctl restart nix-daemon

          nix config show experimental-features
          nix config show substituters

      - name: Build Pages assets
        shell: bash
        run: |
          nix develop --command python scripts/tasks.py bootstrap
          nix develop --command python scripts/tasks.py generate
          nix develop --command python scripts/tasks.py build-wasm
          nix develop --command python scripts/tasks.py build-web

          rm -rf site
          cp -R apps/web-playground/dist site
          touch site/.nojekyll

      - name: Publish to pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin pages >/dev/null 2>&1; then
            git worktree add -B pages pages-worktree origin/pages
          else
            git worktree add -b pages pages-worktree
          fi

          find pages-worktree -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R site/. pages-worktree/

          cd pages-worktree
          git add -A

          if git diff --cached --quiet; then
            echo "No Pages changes to publish."
            exit 0
          fi

          git commit -m "chore: publish github pages"
          git push origin HEAD:pages
